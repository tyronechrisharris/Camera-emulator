# docker-compose.yml
# Fixed version that avoids the Windows/Docker bind-mount error by not mounting ./mediamtx.yml.
# MediaMTX already includes a default /mediamtx.yml inside the image.

services:
  mediamtx:
    image: bluenviron/mediamtx:1.17.1
    container_name: mediamtx
    restart: unless-stopped
    ports:
      - "8554:8554"       # RTSP
      - "1935:1935"       # RTMP
      - "8888:8888"       # HLS
      - "8889:8889"       # WebRTC HTTP
      - "8189:8189/udp"   # WebRTC ICE/UDP
      - "8890:8890/udp"   # SRT
      - "8000:8000/udp"   # RTP
      - "8001:8001/udp"   # RTCP

  camera-01:
    image: lscr.io/linuxserver/ffmpeg:latest
    container_name: camera-01
    restart: unless-stopped
    depends_on:
      - mediamtx
    volumes:
      - ./assets:/assets:ro
    command:
      - "-re"
      - "-stream_loop"
      - "-1"
      - "-i"
      - "/assets/RPM_1.mp4"
      - "-vf"
      - "fps=15,scale=640:480,drawtext=text='%{localtime\\:%T.%6N}':fontcolor=white:fontsize=24:box=1:boxcolor=black@0.6:x=10:y=10"
      - "-c:v"
      - "libx264"
      - "-preset"
      - "veryfast"
      - "-tune"
      - "zerolatency"
      - "-pix_fmt"
      - "yuv420p"
      - "-g"
      - "30"
      - "-c:a"
      - "copy"
      - "-rtsp_transport"
      - "tcp"
      - "-f"
      - "rtsp"
      - "rtsp://mediamtx:8554/cam_01"

  camera-02:
    image: lscr.io/linuxserver/ffmpeg:latest
    container_name: camera-02
    restart: unless-stopped
    depends_on:
      - mediamtx
    volumes:
      - ./assets:/assets:ro
    command:
      - "-re"
      - "-stream_loop"
      - "-1"
      - "-i"
      - "/assets/RPM_2.mp4"
      - "-vf"
      - "fps=15,scale=640:480,drawtext=text='%{localtime\\:%T.%6N}':fontcolor=yellow:fontsize=24:box=1:boxcolor=black@0.6:x=10:y=10"
      - "-c:v"
      - "libx264"
      - "-preset"
      - "veryfast"
      - "-tune"
      - "zerolatency"
      - "-pix_fmt"
      - "yuv420p"
      - "-g"
      - "30"
      - "-c:a"
      - "copy"
      - "-rtsp_transport"
      - "tcp"
      - "-f"
      - "rtsp"
      - "rtsp://mediamtx:8554/cam_02"
